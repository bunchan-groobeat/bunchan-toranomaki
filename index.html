<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="referrer" content="no-referrer" />
<title>ぶんちゃんの虎の巻</title>
<style>
  :root {
    --bg: #121212; --bg2: #1b1b1b;
    --card: #ffffff; --ink: #1a1a1a; --ink-soft: #5c5c5c; --line: #e6e6e6;
    --on-dark: #eaeaea; --on-dark-soft: #9a9a9a; --line-dark: #2c2c2c;
    --red: #c0392b; --red-deep: #9c2f22;
    --tap: 52px; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans",Meiryo,system-ui,sans-serif;
    background: var(--bg); color: var(--on-dark); line-height: 1.75; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 760px; margin: 0 auto; min-height: 100dvh;
    padding: max(env(safe-area-inset-top),14px) 16px calc(env(safe-area-inset-bottom) + 28px); }

  /* 鍵ゲート */
  .gate { min-height: 100dvh; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 18px; text-align: center; padding: 24px; }
  .gate__mark { font-weight: 900; font-size: 26px; letter-spacing: .04em; }
  .gate__mark em { font-style: normal; color: var(--red); }
  .gate__lead { color: var(--on-dark-soft); font-size: 14px; max-width: 30ch; }
  .gate__form { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .gate__input { width: 100%; font: inherit; font-size: 16px; text-align: center; letter-spacing: .06em;
    background: var(--bg2); color: var(--on-dark); border: 1.5px solid var(--line-dark); border-radius: 10px; padding: 14px 16px; min-height: var(--tap); }
  .gate__input:focus { outline: none; border-color: var(--red); }
  .gate__btn { width: 100%; min-height: var(--tap); border: none; border-radius: 10px; cursor: pointer; font: inherit; font-weight: 800; font-size: 16px; background: var(--red); color: #fff; }
  .gate__btn:active { transform: translateY(1px); }
  .gate__err { color: #ff8a80; font-size: 13px; font-weight: 700; min-height: 18px; }
  .gate__note { color: var(--on-dark-soft); font-size: 11.5px; max-width: 34ch; line-height: 1.7; }

  /* ヘッダ・ナビ */
  .head { display: flex; align-items: baseline; gap: 10px; padding: 6px 2px 12px; border-bottom: 1px solid var(--line-dark); }
  .head__mark { font-weight: 900; font-size: 20px; letter-spacing: .03em; }
  .head__mark em { font-style: normal; color: var(--red); }
  .head__sub { color: var(--on-dark-soft); font-size: 12px; }
  .nav { display: flex; gap: 8px; overflow-x: auto; padding: 12px 0 4px; scrollbar-width: none; }
  .nav::-webkit-scrollbar { display: none; }
  .nav__btn { flex: 0 0 auto; font: inherit; font-size: 13.5px; font-weight: 700; cursor: pointer;
    background: var(--bg2); color: var(--on-dark-soft); border: 1px solid var(--line-dark); border-radius: 999px; padding: 8px 14px; min-height: 40px; white-space: nowrap; }
  .nav__btn[aria-current="true"] { background: var(--red); color: #fff; border-color: var(--red); }
  .section__lead { color: var(--on-dark-soft); font-size: 13px; padding: 16px 2px 6px; line-height: 1.7; }

  /* カード */
  .cards { display: grid; gap: 14px; padding: 8px 0; }
  .card { background: var(--card); color: var(--ink); border-radius: var(--radius); padding: 16px 16px 18px; border: 1px solid var(--line); }
  .card__head { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .card__no { flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%; background: #f3eeed; color: var(--red-deep);
    display: grid; place-items: center; font-weight: 900; font-size: 13px; border: 1px solid #edd9d5; }
  .card__role { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 800; color: var(--ink-soft); }
  .card__role .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .card__title { font-size: 17px; font-weight: 900; line-height: 1.45; color: var(--ink); margin: 2px 0 6px; }
  .card__body { font-size: 14.5px; color: #333; }
  .card__point { margin-top: 10px; background: #fbecea; border-left: 4px solid var(--red); border-radius: 8px; padding: 10px 12px; font-size: 13.5px; color: var(--red-deep); }
  .card__point b { font-weight: 900; }
  .codewrap { position: relative; margin-top: 10px; }
  .codewrap pre { background: #1e1e1e; color: #eaeaea; border-radius: 8px; padding: 12px 14px; overflow-x: auto; font-size: 12.5px; font-family: ui-monospace,SFMono-Regular,Menlo,monospace; line-height: 1.6; }
  .copybtn { font: inherit; font-size: 11.5px; font-weight: 800; cursor: pointer; border: 1px solid var(--line); background: #fff; color: var(--red-deep); border-radius: 8px; padding: 5px 10px; }
  .codewrap .copybtn { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,.92); }
  .prompts__label { margin-top: 12px; font-size: 12px; font-weight: 800; color: var(--ink-soft); }
  .prompt { margin-top: 8px; border: 1px solid #d8e2f2; background: #eef3fb; border-radius: 10px; overflow: hidden; }
  .prompt > summary { list-style: none; cursor: pointer; padding: 11px 13px; font-size: 13px; font-weight: 800; color: #24467e; display: flex; align-items: center; gap: 8px; }
  .prompt > summary::-webkit-details-marker { display: none; }
  .prompt > summary::before { content: "📄"; }
  .prompt > summary::after { content: "▸"; margin-left: auto; transition: transform .15s; }
  .prompt[open] > summary::after { transform: rotate(90deg); }
  .prompt__body { padding: 0 13px 13px; }
  .prompt__body pre { white-space: pre-wrap; word-break: break-word; background: #fff; border: 1px solid #dce4f0; border-radius: 8px; padding: 12px; font-size: 12.5px; line-height: 1.7; color: #1a2b47; font-family: inherit; }
  .prompt__body .copybtn { margin-top: 8px; }
  .card__link { display: inline-block; margin-top: 10px; font-size: 13px; font-weight: 800; color: #24467e; text-decoration: none; }
  .card__imgreq { margin-top: 10px; font-size: 12px; color: var(--ink-soft); border: 1px dashed var(--line); border-radius: 8px; padding: 8px 10px; }
  .card--soon { color: var(--on-dark-soft); background: var(--bg2); border: 1px dashed var(--line-dark); text-align: center; padding: 26px 18px; }
  .copied { font-size: 12px; color: #1e7e34; font-weight: 800; }

  /* ⑨ 今日の学び（learnings） */
  .card__meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .card__date { color: var(--ink-soft); font-size: 12px; font-weight: 700; }
  .card__tag { font-size: 11px; font-weight: 800; color: var(--red-deep); border: 1px solid #eec7c2; background: #fbecea; border-radius: 999px; padding: 2px 9px; }
  .md p { margin: 8px 0; font-size: 14.5px; color: #333; } .md ul { margin: 6px 0 6px 1.2em; } .md li { margin: 3px 0; }
  .md code { background: #f3f0ef; border-radius: 5px; padding: 1px 6px; font-size: 13px; } .md a { color: var(--red-deep); }
  .md h3,.md h4,.md h5 { margin: 12px 0 4px; font-size: 15px; }

  .foot { color: var(--on-dark-soft); font-size: 11px; text-align: center; padding: 20px 0 4px; line-height: 1.7; }
  [hidden] { display: none !important; }
</style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="gate__mark">ぶんちゃんの<em>虎の巻</em></div>
    <div class="gate__lead">アクセスキーを入力してください。</div>
    <form class="gate__form" id="gateForm">
      <input class="gate__input" id="gateInput" type="password" inputmode="text"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
        placeholder="tora-****-****-****" aria-label="アクセスキー" />
      <button class="gate__btn" type="submit">ひらく</button>
      <div class="gate__err" id="gateErr" aria-live="assertive"></div>
    </form>
    <div class="gate__note">※簡易的な鍵（クライアント側照合）です。強い秘匿は保証しません。秘密情報・顧客名・金額は載せない前提で運用します。</div>
  </div>

  <div class="wrap" id="app" hidden>
    <div class="head">
      <div class="head__mark">ぶんちゃんの<em>虎の巻</em></div>
      <div class="head__sub">現場の技術リファレンス</div>
    </div>
    <div class="nav" id="nav"></div>
    <div id="section"></div>
    <div class="foot">社長・ターミナルAI・スタッフ共通の教科書／非公開(noindex)・完全同一オリジン</div>
  </div>

<script src="content.js"></script>
<script>
(function () {
  'use strict';
  // アクセスキーの SHA-256（平文はリポに置かない）。簡易鍵＝機微情報を載せない運用で担保。
  var KEYHASH = '36eee44e18d38397dfb6fcc3508b3695cc11c26c29a57d40a6877ebb3d73afac';
  var DATA = window.TORA_CONTENT || { roles: {}, chapters: [] };
  var ROLES = DATA.roles || {};
  var CH = DATA.chapters || [];

  var gate = document.getElementById('gate'), app = document.getElementById('app');
  var form = document.getElementById('gateForm'), input = document.getElementById('gateInput'), err = document.getElementById('gateErr');
  var nav = document.getElementById('nav'), section = document.getElementById('section');

  function el(t, c, x) { var n = document.createElement(t); if (c) n.className = c; if (x != null) n.textContent = x; return n; }
  function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }

  async function sha256hex(s) { var b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
    return Array.from(new Uint8Array(b)).map(function (x) { return x.toString(16).padStart(2, '0'); }).join(''); }
  form.addEventListener('submit', function (e) {
    e.preventDefault(); err.textContent = '';
    var v = (input.value || '').trim(); if (!v) { err.textContent = 'キーを入力してください'; return; }
    sha256hex(v).then(function (h) {
      if (h === KEYHASH) { try { sessionStorage.setItem('tora_ok', '1'); } catch (e) {} openApp(); }
      else { err.textContent = 'キーが違います'; input.select(); }
    }).catch(function () { err.textContent = 'この端末では鍵照合に対応していません'; });
  });

  function openApp() { gate.hidden = true; app.hidden = false; buildNav(); showChapter(CH[0] && CH[0].key); window.scrollTo(0, 0); }

  function buildNav() {
    clear(nav);
    CH.forEach(function (c) {
      var b = el('button', 'nav__btn', c.name); b.type = 'button'; b.dataset.key = c.key;
      b.addEventListener('click', function () { showChapter(c.key); });
      nav.appendChild(b);
    });
  }
  function markNav(key) { Array.prototype.forEach.call(nav.children, function (b) { b.setAttribute('aria-current', b.dataset.key === key ? 'true' : 'false'); }); }

  function showChapter(key) {
    var ch = CH.filter(function (c) { return c.key === key; })[0] || CH[0];
    markNav(ch.key); clear(section);
    if (ch.lead) section.appendChild(el('div', 'section__lead', ch.lead));
    var wrap = el('div', 'cards'); section.appendChild(wrap);
    if (ch.today) { renderToday(wrap); }
    else if (ch.soon || !(ch.cards && ch.cards.length)) { wrap.appendChild(el('div', 'card card--soon', '準備中 — 第2段で充実させます。')); }
    else { ch.cards.forEach(function (card) { wrap.appendChild(buildCard(card)); }); }
    window.scrollTo(0, 0);
  }

  // ---- 工程カード ----
  function buildCard(c) {
    var card = el('div', 'card');
    if (c.no || c.role) {
      var head = el('div', 'card__head');
      if (c.no) head.appendChild(el('div', 'card__no', c.no));
      if (c.role) {
        var r = el('div', 'card__role');
        var dot = el('span', 'dot'); dot.style.background = ROLES[c.role] || '#888';
        r.appendChild(dot); r.appendChild(document.createTextNode(c.role));
        head.appendChild(r);
      }
      card.appendChild(head);
    }
    if (c.title) card.appendChild(el('div', 'card__title', c.title));
    if (c.body) card.appendChild(el('div', 'card__body', c.body));
    if (c.point) { var p = el('div', 'card__point'); var b = el('b', null, '要点：'); p.appendChild(b); p.appendChild(document.createTextNode(c.point)); card.appendChild(p); }
    if (c.code) card.appendChild(codeBlock(c.code));
    if (c.prompts && c.prompts.length) {
      card.appendChild(el('div', 'prompts__label', 'ここで使うプロンプト（押すと開く）'));
      c.prompts.forEach(function (pr) { card.appendChild(promptBlock(pr)); });
    }
    if (c.link) { var a = el('a', 'card__link', c.link.label + ' ↗'); if (/^(https?:\/\/|\/|#)/.test(c.link.url)) { a.href = c.link.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; } card.appendChild(a); }
    if (c.img) card.appendChild(el('div', 'card__imgreq', '🖼 画像：' + (c.img.note || '撮影依頼リスト参照（第2段で流し込み）')));
    return card;
  }

  function codeBlock(text) {
    var w = el('div', 'codewrap'); var pre = document.createElement('pre'); pre.textContent = text; w.appendChild(pre);
    var btn = el('button', 'copybtn', 'コピー'); btn.type = 'button';
    btn.addEventListener('click', function () { doCopy(text, btn); }); w.appendChild(btn);
    return w;
  }
  function promptBlock(pr) {
    var d = document.createElement('details'); d.className = 'prompt';
    var s = document.createElement('summary'); s.textContent = pr.label; d.appendChild(s);
    var body = el('div', 'prompt__body'); var pre = document.createElement('pre'); pre.textContent = pr.text; body.appendChild(pre);
    var btn = el('button', 'copybtn', '📋 プロンプトをコピー'); btn.type = 'button';
    btn.addEventListener('click', function () { doCopy(pr.text, btn); }); body.appendChild(btn);
    d.appendChild(body); return d;
  }
  function doCopy(text, btn) {
    var done = function (ok) { var old = btn.textContent; btn.textContent = ok ? '✓ コピーしました' : '長押しで選択してください'; setTimeout(function () { btn.textContent = old; }, 1800); };
    if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(function () { done(true); }, function () { legacy(text, done); }); }
    else { legacy(text, done); }
  }
  function legacy(text, done) { try { var ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); var ok = document.execCommand('copy'); document.body.removeChild(ta); done(ok); } catch (e) { done(false); } }

  // ---- ⑨ 今日の学び（learnings/NNN.md を連番読込）----
  function renderToday(wrap) {
    wrap.appendChild(el('div', 'card card--soon', '読み込み中…'));
    loadLearnings().then(function (items) {
      clear(wrap);
      if (!items.length) { wrap.appendChild(el('div', 'card card--soon', 'まだ追記はありません。learnings/001.md を追加してください。')); return; }
      items.forEach(function (it) { wrap.appendChild(learnCard(it)); });
    }).catch(function () { clear(wrap); wrap.appendChild(el('div', 'card card--soon', '読み込みに失敗しました。')); });
  }
  async function loadLearnings() {
    var items = [], miss = 0, i = 1;
    while (i <= 300 && miss < 3) {
      var n = String(i).padStart(3, '0');
      try { var res = await fetch('learnings/' + n + '.md', { cache: 'no-cache' }); if (res.ok) { var t = await res.text(); var p = parseFM(t); items.push({ n: i, fm: p.fm, body: p.body }); miss = 0; } else { miss++; } }
      catch (e) { miss++; }
      i++;
    }
    items.sort(function (a, b) { return b.n - a.n; }); return items;
  }
  function parseFM(md) {
    var fm = { title: '', date: '', tags: [] }, body = md;
    var m = md.match(/^---\s*\n([\s\S]*?)\n---\s*\n?([\s\S]*)$/);
    if (m) { body = m[2]; m[1].split('\n').forEach(function (line) { var kv = line.match(/^(\w+):\s*(.*)$/); if (!kv) return; if (kv[1] === 'tags') fm.tags = kv[2].split(',').map(function (s) { return s.trim(); }).filter(Boolean); else if (fm.hasOwnProperty(kv[1])) fm[kv[1]] = kv[2].trim(); }); }
    return { fm: fm, body: body };
  }
  function learnCard(it) {
    var card = el('div', 'card');
    var meta = el('div', 'card__meta');
    if (it.fm.date) meta.appendChild(el('span', 'card__date', it.fm.date));
    it.fm.tags.forEach(function (t) { meta.appendChild(el('span', 'card__tag', t)); });
    if (meta.childNodes.length) card.appendChild(meta);
    if (it.fm.title) card.appendChild(el('div', 'card__title', it.fm.title));
    var b = el('div', 'md'); renderMarkdown(it.body, b); card.appendChild(b);
    return card;
  }
  function renderMarkdown(md, container) {
    md.replace(/\r/g, '').split(/\n{2,}/).forEach(function (block) {
      block = block.replace(/^\n+|\n+$/g, ''); if (!block) return;
      if (/^```/.test(block)) { var code = block.replace(/^```[^\n]*\n?/, '').replace(/\n?```\s*$/, ''); var pre = document.createElement('pre'); pre.textContent = code; container.appendChild(pre); return; }
      var lines = block.split('\n');
      var h = lines.length === 1 && lines[0].match(/^(#{1,4})\s+(.*)$/);
      if (h) { var he = el('h' + Math.min(h[1].length + 2, 5)); inlineMd(h[2], he); container.appendChild(he); return; }
      if (lines.every(function (l) { return /^[-*]\s+/.test(l); })) { var ul = document.createElement('ul'); lines.forEach(function (l) { var li = document.createElement('li'); inlineMd(l.replace(/^[-*]\s+/, ''), li); ul.appendChild(li); }); container.appendChild(ul); return; }
      var p = document.createElement('p'); inlineMd(block.replace(/\n/g, ' '), p); container.appendChild(p);
    });
  }
  function inlineMd(text, parent) {
    var re = /(\*\*([^*]+)\*\*|`([^`]+)`|\[([^\]]+)\]\(([^)\s]+)\))/g, last = 0, m;
    while ((m = re.exec(text))) {
      if (m.index > last) parent.appendChild(document.createTextNode(text.slice(last, m.index)));
      if (m[2] !== undefined) parent.appendChild(el('strong', null, m[2]));
      else if (m[3] !== undefined) parent.appendChild(el('code', null, m[3]));
      else if (m[4] !== undefined) { var a = el('a', null, m[4]); if (/^(https?:\/\/|\/|#)/.test(m[5])) { a.href = m[5]; a.target = '_blank'; a.rel = 'noopener noreferrer'; } parent.appendChild(a); }
      last = re.lastIndex;
    }
    if (last < text.length) parent.appendChild(document.createTextNode(text.slice(last)));
  }

  try { if (sessionStorage.getItem('tora_ok') === '1') openApp(); else input.focus(); } catch (e) { input.focus(); }
})();
</script>
</body>
</html>
